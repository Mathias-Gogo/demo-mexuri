<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mexuri — Agent Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface2: #181818;
            --border: #222222;
            --border2: #2a2a2a;
            --text: #f0f0f0;
            --muted: #666;
            --muted2: #444;
            --accent: #e8ff47;
            --accent2: #b8ff00;
            --veya: #ff6b6b;
            --halo: #6bceff;
            --synk: #a78bfa;
            --harold: #fbbf24;
            --atlas: #34d399;
            --radius: 14px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ONBOARDING OVERLAY */
        #onboarding {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .onboarding-card {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 48px;
            max-width: 520px;
            width: 100%;
            animation: fadeUp 0.5s ease;
        }

        .onboarding-card .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: var(--accent);
            margin-bottom: 32px;
        }

        .onboarding-card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .onboarding-card p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        .form-group select option {
            background: #1a1a1a;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-primary {
            width: 100%;
            margin-top: 8px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius-sm);
            padding: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary:hover {
            background: var(--accent2);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* DASHBOARD */
        #dashboard {
            display: none;
            min-height: 100vh;
        }

        /* TOP NAV */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
        }

        .nav-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
        }

        .nav-badge {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
        }

        /* LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: calc(100vh - 65px);
        }

        /* SIDEBAR */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted2);
            font-weight: 600;
            padding: 0 10px;
            margin: 16px 0 6px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s;
            font-size: 14px;
            color: var(--muted);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .sidebar-item.active {
            background: var(--surface2);
            color: var(--text);
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* MAIN */
        .main {
            padding: 32px;
            overflow-y: auto;
        }

        /* GREETING HEADER */
        .greeting {
            margin-bottom: 32px;
        }

        .greeting h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .greeting p {
            color: var(--muted);
            font-size: 14px;
        }

        /* AGENT CARDS GRID */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--agent-color);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .agent-card:hover {
            border-color: var(--border2);
            transform: translateY(-2px);
        }

        .agent-card:hover::before {
            opacity: 1;
        }

        .agent-card.active {
            border-color: var(--agent-color);
        }

        .agent-card.active::before {
            opacity: 1;
        }

        .agent-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .agent-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: color-mix(in srgb, var(--agent-color) 15%, transparent);
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--agent-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .agent-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .agent-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: color-mix(in srgb, var(--agent-color) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--agent-color) 30%, transparent);
            color: var(--agent-color);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .agent-action-btn:hover {
            background: color-mix(in srgb, var(--agent-color) 22%, transparent);
        }

        /* WORKSPACE */
        .workspace {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .workspace-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
        }

        .workspace-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .workspace-tag {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            color: var(--muted);
        }

        .workspace-body {
            padding: 22px;
        }

        /* PROMPT INPUT */
        .prompt-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .prompt-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .prompt-input:focus {
            border-color: var(--accent);
        }

        .run-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius-sm);
            padding: 12px 20px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, transform 0.1s;
        }

        .run-btn:hover {
            background: var(--accent2);
        }

        .run-btn:disabled {
            background: var(--border2);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* OUTPUT */
        .output-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            min-height: 180px;
            padding: 18px;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text);
            position: relative;
        }

        .output-placeholder {
            color: var(--muted2);
            font-style: italic;
            font-size: 13px;
        }

        .output-agent-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            font-style: italic;
        }

        .thinking-dots span {
            display: inline-block;
            animation: blink 1.2s infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        /* QUICK PROMPTS */
        .quick-prompts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .quick-chip {
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .quick-chip:hover {
            border-color: var(--agent-color, var(--accent));
            color: var(--text);
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeUp 0.4s ease forwards;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .main {
                padding: 20px;
            }

            .onboarding-card {
                padding: 32px 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- ONBOARDING -->
    <div id="onboarding">
        <div class="onboarding-card">
            <div class="logo">mexuri</div>
            <h2>Tell us about your business</h2>
            <p>Your answers power every agent. The more honest you are, the smarter they get.</p>

            <div class="form-row">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="userName" placeholder="e.g. Mathias" />
                </div>
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" id="bizName" placeholder="e.g. Acme Inc." />
                </div>
            </div>

            <div class="form-group">
                <label>Industry / Niche</label>
                <input type="text" id="industry" placeholder="e.g. SaaS, Fashion, Consulting, Fintech…" />
            </div>

            <div class="form-group">
                <label>Target Audience</label>
                <input type="text" id="audience" placeholder="e.g. Nigerian SMBs, Gen Z consumers…" />
            </div>

            <div class="form-group">
                <label>What problem do you solve?</label>
                <textarea id="problem" placeholder="Describe your core value proposition in 1–2 sentences…"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Business Stage</label>
                    <select id="stage">
                        <option value="">Select…</option>
                        <option>Idea / Pre-launch</option>
                        <option>MVP / Early traction</option>
                        <option>Growth</option>
                        <option>Scaling</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Primary Goal Right Now</label>
                    <select id="goal">
                        <option value="">Select…</option>
                        <option>Get first customers</option>
                        <option>Raise funding</option>
                        <option>Build product</option>
                        <option>Grow revenue</option>
                        <option>Expand market</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" onclick="launchDashboard()">Launch My Dashboard →</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <nav class="nav">
            <div class="nav-logo">mexuri</div>
            <div style="display:flex;align-items:center;gap:12px;">
                <span class="nav-badge">Demo Mode</span>
                <div class="nav-user">
                    <div class="nav-avatar" id="navInitial">M</div>
                    <span id="navName">User</span>
                </div>
            </div>
        </nav>

        <div class="layout">
            <!-- SIDEBAR -->
            <aside class="sidebar">
                <div class="sidebar-label">Overview</div>
                <button class="sidebar-item active" onclick="showOverview()">
                    <span>⚡</span> Dashboard
                </button>

                <div class="sidebar-label">Agents</div>
                <button class="sidebar-item" onclick="openAgent('veya')" style="--agent-color: var(--veya)">
                    <span class="agent-dot" style="background:var(--veya)"></span> Veya
                </button>
                <button class="sidebar-item" onclick="openAgent('halo')" style="--agent-color: var(--halo)">
                    <span class="agent-dot" style="background:var(--halo)"></span> Halo
                </button>
                <button class="sidebar-item" onclick="openAgent('synk')" style="--agent-color: var(--synk)">
                    <span class="agent-dot" style="background:var(--synk)"></span> Synk
                </button>
                <button class="sidebar-item" onclick="openAgent('harold')" style="--agent-color: var(--harold)">
                    <span class="agent-dot" style="background:var(--harold)"></span> Harold
                </button>
                <button class="sidebar-item" onclick="openAgent('atlas')" style="--agent-color: var(--atlas)">
                    <span class="agent-dot" style="background:var(--atlas)"></span> Atlas
                </button>
            </aside>

            <!-- MAIN -->
            <main class="main" id="mainContent">
                <!-- Overview injected here -->
            </main>
        </div>
    </div>

    <script>
        const AGENTS = {
            veya: {
                name: 'Veya',
                role: 'Content Creation',
                color: '#ff6b6b',
                icon: '✍️',
                cssVar: 'var(--veya)',
                prompts: ['Write a LinkedIn post', 'Create a product description', 'Draft an email newsletter', 'Write social media captions'],
                systemPrompt: (dna) => `You are Veya, an AI content creation agent for ${dna.bizName || 'this business'} — a ${dna.industry || 'company'} that serves ${dna.audience || 'their target market'} by solving: "${dna.problem || 'key business problems'}". Business stage: ${dna.stage}. Current goal: ${dna.goal}. Your job is to create sharp, compelling, on-brand content. Be specific to their business context. Keep responses practical and immediately usable. Format with clear structure when needed.`
            },
            halo: {
                name: 'Halo',
                role: 'Marketing Strategy',
                color: '#6bceff',
                icon: '📡',
                cssVar: 'var(--halo)',
                prompts: ['Build a go-to-market plan', 'Suggest growth channels', 'Create a launch strategy', 'Analyse my competitors'],
                systemPrompt: (dna) => `You are Halo, an AI marketing strategy agent for ${dna.bizName || 'this business'} — a ${dna.industry || 'company'} targeting ${dna.audience || 'their market'} with the value proposition: "${dna.problem || 'solving key problems'}". Stage: ${dna.stage}. Goal: ${dna.goal}. You provide strategic marketing advice tailored to their context. Give actionable, prioritized strategies. Consider their stage and goal heavily in recommendations.`
            },
            synk: {
                name: 'Synk',
                role: 'Web Development',
                color: '#a78bfa',
                icon: '⚙️',
                cssVar: 'var(--synk)',
                prompts: ['Plan my website structure', 'Suggest tech stack', 'Review my landing page copy', 'Create a feature roadmap'],
                systemPrompt: (dna) => `You are Synk, an AI web development agent for ${dna.bizName || 'this business'} — a ${dna.industry || 'company'} at the ${dna.stage || 'growth'} stage. Their audience: ${dna.audience}. Goal: ${dna.goal}. You provide technical guidance, web strategy, and development recommendations. Be practical, modern, and consider their business stage when recommending complexity of solutions.`
            },
            harold: {
                name: 'Harold',
                role: 'Research',
                color: '#fbbf24',
                icon: '🔍',
                cssVar: 'var(--harold)',
                prompts: ['Research my market size', 'Analyse industry trends', 'Find my competitors', 'Benchmark pricing strategies'],
                systemPrompt: (dna) => `You are Harold, an AI research agent for ${dna.bizName || 'this business'} — operating in ${dna.industry || 'their industry'}, targeting ${dna.audience || 'their market'}. Stage: ${dna.stage}. Goal: ${dna.goal}. You conduct research and provide data-driven insights, market analysis, and competitive intelligence relevant to their business. Structure findings clearly with key takeaways.`
            },
            atlas: {
                name: 'Atlas',
                role: 'Strategy',
                color: '#34d399',
                icon: '🧭',
                cssVar: 'var(--atlas)',
                prompts: ['Build a 90-day plan', 'Prioritise my initiatives', 'Review my business model', 'Plan my fundraising strategy'],
                systemPrompt: (dna) => `You are Atlas, an AI strategy agent for ${dna.bizName || 'this business'} — a ${dna.industry || 'company'} solving "${dna.problem || 'key problems'}" for ${dna.audience || 'their market'}. Stage: ${dna.stage}. Goal: ${dna.goal}. You provide high-level strategic thinking, business planning, and decision-making frameworks. Think like a seasoned advisor. Be direct, prioritized, and specific to their context.`
            }
        };

        let businessDNA = {};
        let activeAgent = null;

        function launchDashboard() {
            businessDNA = {
                userName: document.getElementById('userName').value || 'Founder',
                bizName: document.getElementById('bizName').value || 'Your Business',
                industry: document.getElementById('industry').value || 'your industry',
                audience: document.getElementById('audience').value || 'your target audience',
                problem: document.getElementById('problem').value || 'solving key problems',
                stage: document.getElementById('stage').value || 'Growth',
                goal: document.getElementById('goal').value || 'grow revenue'
            };

            document.getElementById('navInitial').textContent = businessDNA.userName.charAt(0).toUpperCase();
            document.getElementById('navName').textContent = businessDNA.userName;

            document.getElementById('onboarding').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            showOverview();
        }

        function showOverview() {
            activeAgent = null;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-item')[0].classList.add('active');

            const main = document.getElementById('mainContent');
            main.innerHTML = `
    <div class="greeting fade-in">
      <h1>Good to have you, ${businessDNA.userName} 👋</h1>
      <p>${businessDNA.bizName} · ${businessDNA.industry} · ${businessDNA.stage}</p>
    </div>

    <div class="agents-grid">
      ${Object.entries(AGENTS).map(([key, a]) => `
        <div class="agent-card fade-in" style="--agent-color:${a.color}" onclick="openAgent('${key}')">
          <div class="agent-header">
            <div class="agent-icon" style="--agent-color:${a.color}">${a.icon}</div>
            <div class="agent-status">
              <div class="status-dot" style="--agent-color:${a.color}"></div>
              Active
            </div>
          </div>
          <div class="agent-name">${a.name}</div>
          <div class="agent-role">${a.role}</div>
          <button class="agent-action-btn" style="--agent-color:${a.color}">
            Open Agent →
          </button>
        </div>
      `).join('')}
    </div>
  `;
        }

        function openAgent(key) {
            activeAgent = key;
            const agent = AGENTS[key];

            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(el => {
                if (el.textContent.trim() === agent.name) el.classList.add('active');
            });

            const main = document.getElementById('mainContent');
            main.innerHTML = `
    <div class="greeting fade-in">
      <h1 style="display:flex;align-items:center;gap:10px;">
        <span>${agent.icon}</span>
        <span style="color:${agent.color}">${agent.name}</span>
      </h1>
      <p style="color:var(--muted)">${agent.role} Agent · Personalised for ${businessDNA.bizName}</p>
    </div>

    <div class="workspace fade-in">
      <div class="workspace-header">
        <div class="workspace-title" style="--agent-color:${agent.color}">
          <span style="color:${agent.color}">●</span>
          ${agent.name} Workspace
        </div>
        <span class="workspace-tag">${businessDNA.bizName}</span>
      </div>
      <div class="workspace-body">
        <div class="prompt-area">
          <input
            class="prompt-input"
            id="promptInput"
            placeholder="Ask ${agent.name} anything about your business…"
            onkeydown="if(event.key==='Enter') runAgent('${key}')"
          />
          <button class="run-btn" id="runBtn" onclick="runAgent('${key}')">Run →</button>
        </div>

        <div class="output-box" id="outputBox">
          <div class="output-placeholder">
            ${agent.name} is ready. Ask a question or pick a prompt below.
          </div>
        </div>

        <div class="quick-prompts" style="--agent-color:${agent.color}">
          ${agent.prompts.map(p => `
            <div class="quick-chip" onclick="useQuickPrompt('${key}', \`${p}\`)">
              ${p}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
        }

        function useQuickPrompt(key, prompt) {
            document.getElementById('promptInput').value = prompt;
            runAgent(key);
        }

        async function runAgent(key) {
            const agent = AGENTS[key];
            const input = document.getElementById('promptInput').value.trim();
            if (!input) return;

            const btn = document.getElementById('runBtn');
            const outputBox = document.getElementById('outputBox');

            btn.disabled = true;
            btn.textContent = '…';

            outputBox.innerHTML = `
    <div class="output-agent-label" style="color:${agent.color}">
      <span>●</span> ${agent.name} · ${agent.role}
    </div>
    <div class="thinking">
      ${agent.icon} Thinking
      <span class="thinking-dots">
        <span>.</span><span>.</span><span>.</span>
      </span>
    </div>
  `;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: agent.systemPrompt(businessDNA),
                        messages: [{ role: 'user', content: input }]
                    })
                });

                const data = await response.json();
                const text = data.content?.[0]?.text || 'No response.';
                const formatted = text
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/^#{1,3} (.+)$/gm, '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin:14px 0 6px;">$1</div>')
                    .replace(/^- (.+)$/gm, '<div style="padding:3px 0 3px 12px;border-left:2px solid var(--border2);">$1</div>')
                    .replace(/\n\n/g, '<br/><br/>')
                    .replace(/\n/g, '<br/>');

                outputBox.innerHTML = `
      <div class="output-agent-label" style="color:${agent.color}">
        <span>●</span> ${agent.name} · ${agent.role}
      </div>
      <div>${formatted}</div>
    `;
            } catch (err) {
                outputBox.innerHTML = `
      <div class="output-agent-label" style="color:var(--veya)">
        <span>●</span> Error
      </div>
      <div style="color:var(--muted)">Something went wrong. Please try again.</div>
    `;
            }

            btn.disabled = false;
            btn.textContent = 'Run →';
        }
    </script>
</body>

</html>
